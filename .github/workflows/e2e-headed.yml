name: E2E Headed Chrome

on:
  push:
    branches: [main, dev]
    paths:
      - 'extension/**'
      - 'src/browser/**'
      - 'src/daemon.ts'
      - 'src/execution.ts'
      - 'src/interceptor.ts'
      - 'tests/e2e/**'
      - 'tests/smoke/**'
      - '.github/actions/setup-chrome/**'
      - '.github/workflows/e2e-headed.yml'
    tags: ['v*']
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-headed:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10.26.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Chrome
        uses: ./.github/actions/setup-chrome
        id: setup-chrome

      - name: Build
        run: pnpm run build

      - name: Build extension
        run: npm run build --prefix extension

      - name: Run AX Chrome smoke (Linux, via xvfb)
        if: runner.os == 'Linux'
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          OPENCLI_AX_E2E: '1'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
            pnpm exec vitest run --project e2e tests/e2e/browser-ax-chrome.test.ts --reporter=verbose

      - name: Run AX Chrome smoke (macOS / Windows)
        if: runner.os != 'Linux'
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          OPENCLI_AX_E2E: '1'
        run: pnpm exec vitest run --project e2e tests/e2e/browser-ax-chrome.test.ts --reporter=verbose

      - name: Run E2E tests (Linux, via xvfb)
        if: runner.os == 'Linux'
        env:
          OPENCLI_AX_E2E: '0'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
            pnpm exec vitest run tests/e2e/ --reporter=verbose

      - name: Run E2E tests (macOS / Windows)
        if: runner.os != 'Linux'
        env:
          OPENCLI_AX_E2E: '0'
        run: pnpm exec vitest run tests/e2e/ --reporter=verbose
