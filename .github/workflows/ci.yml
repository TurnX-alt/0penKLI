name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 08:00 UTC — smoke tests
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast gate: typecheck + build ──
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10.26.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build

      - name: Check cli-manifest.json is up-to-date
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if ! git diff --exit-code -- cli-manifest.json; then
            echo "::error::cli-manifest.json is out of sync with the source. Run 'pnpm run build' and commit the result."
            exit 1
          fi

      - name: Check silent column drops
        if: runner.os == 'Linux'
        run: pnpm run check:silent-column-drop

      - name: Check typed-error lint baseline
        if: runner.os == 'Linux'
        run: pnpm run check:typed-error-lint

  # ── Unit tests (vitest shard) ──
  unit-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
        node-version: ${{ (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && fromJSON('["22"]') || fromJSON('["22"]') }}
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        run: npm install -g pnpm@10.26.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests (Node ${{ matrix.node-version }}, shard ${{ matrix.shard }}/2)
        run: pnpm exec vitest run --project unit --project extension --reporter=verbose --shard=${{ matrix.shard }}/2

  # ── Bun compatibility check ──
  bun-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10.26.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests under Bun
        run: bun vitest run --project unit --reporter=verbose

  # Adapter tests are pure unit tests — OS doesn't affect results.
  adapter-test:
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10.26.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run focused adapter tests
        run: pnpm run test:adapter -- --reporter=verbose

  # ── Smoke tests (scheduled / manual only) ──
  smoke-test:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10.26.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Chrome
        uses: ./.github/actions/setup-chrome
        id: setup-chrome

      - name: Build
        run: pnpm run build

      - name: Run smoke tests (Linux, via xvfb)
        if: runner.os == 'Linux'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
            pnpm exec vitest run tests/smoke/ --reporter=verbose

      - name: Run smoke tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: pnpm exec vitest run tests/smoke/ --reporter=verbose
    timeout-minutes: 15
